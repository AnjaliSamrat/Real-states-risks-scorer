[build]
  # Build the frontend
  base = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

# Note: API calls are configured via VITE_API_URL environment variable
# The frontend will directly call the backend URL (configure in Netlify UI or .env.production)

[[redirects]]
  # SPA fallback - all other routes should serve index.html
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
